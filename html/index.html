<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMP 2132 | Final Project | Hangman</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- JavaScript -->
    <script src="js/finalproject.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1>Hangman Game</h1>
        </div>
    </header>

    <main class="site-shell">
        <section class="card hangman-card">
            <h2>Guess the Word</h2>
            <p class="muted">
                Enter one letter at a time. You can make up to 6 wrong guesses.
            </p>

            <div class="hangman-figure-wrap">
                <img
                    id="hangman-image"
                    class="hangman-image fade-in"
                    src="images/hangman-0.png"
                    alt="Hangman drawing stage 0"
                >
            </div>

            <div class="status-row">
                <p><strong>Hint:</strong> <span id="hint-text">Loading...</span></p>
                <p><strong>Wrong Guesses:</strong> <span id="wrong-count">0</span> / 6</p>
            </div>

            <div id="word-display" class="word-display">_ _ _ _ _</div>

            <div class="guess-panel">
                <label for="letter-input">Enter a Letter</label>
                <div class="guess-controls">
                    <input type="text" id="letter-input" maxlength="1" autocomplete="off">
                    <button id="guess-button" class="btn btn-primary" type="button">Guess</button>
                    <button id="play-again-button" class="btn btn-ghost" type="button">Play Again</button>
                </div>
            </div>

            <div class="game-meta">
                <p><strong>Guessed Letters:</strong> <span id="guessed-letters">None yet</span></p>
                <p id="message-area" class="message-area">Start guessing!</p>
            </div>
        </section>

        <section class="card keyboard-card">
            <h2>Letter Board</h2>
            <div id="letter-board" class="letter-board"></div>
        </section>
    </main>
</body>
</html>
